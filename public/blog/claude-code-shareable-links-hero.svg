<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Drop shadows -->
    <filter id="termShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="linkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f17"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <!-- Terminal title bar gradient -->
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
    <!-- Gist card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle decorative circles -->
  <circle cx="150" cy="500" r="180" fill="#6c5ce7" opacity="0.06"/>
  <circle cx="1050" cy="130" r="220" fill="#00b894" opacity="0.05"/>

  <!-- === BACK LAYER: Gist page card, tilted +5° === -->
  <g transform="translate(720, 310) rotate(5)" filter="url(#cardShadow)">
    <rect x="-200" y="-180" width="400" height="360" rx="12" fill="url(#cardGrad)" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Browser-like top bar -->
    <rect x="-200" y="-180" width="400" height="36" rx="12" fill="#f0f1f3"/>
    <rect x="-200" y="-156" width="400" height="12" fill="#f0f1f3"/>
    <!-- URL bar -->
    <rect x="-160" y="-170" width="260" height="22" rx="6" fill="#ffffff" stroke="#d0d0d0" stroke-width="0.8"/>
    <text x="-148" y="-155" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#888">md.solberg.is/a1b2c3d4</text>
    <!-- Dots -->
    <circle cx="-183" cy="-162" r="4.5" fill="#ff5f57"/>
    <circle cx="-170" cy="-162" r="4.5" fill="#febc2e"/>
    <circle cx="-157" cy="-162" r="4.5" fill="#28c840"/>

    <!-- Abstract markdown content lines -->
    <!-- Title -->
    <rect x="-170" y="-120" width="220" height="14" rx="3" fill="#2d3436" opacity="0.8"/>
    <!-- Subtitle / date -->
    <rect x="-170" y="-98" width="120" height="8" rx="2" fill="#b2bec3" opacity="0.5"/>

    <!-- Paragraph block 1 -->
    <rect x="-170" y="-72" width="310" height="7" rx="2" fill="#636e72" opacity="0.3"/>
    <rect x="-170" y="-60" width="280" height="7" rx="2" fill="#636e72" opacity="0.3"/>
    <rect x="-170" y="-48" width="300" height="7" rx="2" fill="#636e72" opacity="0.3"/>
    <rect x="-170" y="-36" width="190" height="7" rx="2" fill="#636e72" opacity="0.3"/>

    <!-- Code block -->
    <rect x="-170" y="-14" width="320" height="60" rx="6" fill="#f5f6f8" stroke="#e8e8e8" stroke-width="0.5"/>
    <rect x="-155" y="-2" width="180" height="6" rx="1.5" fill="#6c5ce7" opacity="0.4"/>
    <rect x="-155" y="10" width="140" height="6" rx="1.5" fill="#00b894" opacity="0.35"/>
    <rect x="-155" y="22" width="200" height="6" rx="1.5" fill="#6c5ce7" opacity="0.3"/>
    <rect x="-155" y="34" width="100" height="6" rx="1.5" fill="#00b894" opacity="0.25"/>

    <!-- Paragraph block 2 -->
    <rect x="-170" y="62" width="300" height="7" rx="2" fill="#636e72" opacity="0.3"/>
    <rect x="-170" y="74" width="280" height="7" rx="2" fill="#636e72" opacity="0.3"/>
    <rect x="-170" y="86" width="250" height="7" rx="2" fill="#636e72" opacity="0.3"/>

    <!-- Bullet list -->
    <circle cx="-160" cy="110" r="3" fill="#6c5ce7" opacity="0.5"/>
    <rect x="-148" y="107" width="180" height="6" rx="1.5" fill="#636e72" opacity="0.3"/>
    <circle cx="-160" cy="124" r="3" fill="#6c5ce7" opacity="0.5"/>
    <rect x="-148" y="121" width="150" height="6" rx="1.5" fill="#636e72" opacity="0.3"/>
    <circle cx="-160" cy="138" r="3" fill="#6c5ce7" opacity="0.5"/>
    <rect x="-148" y="135" width="200" height="6" rx="1.5" fill="#636e72" opacity="0.3"/>

    <!-- Footer line -->
    <rect x="-170" y="158" width="100" height="5" rx="1.5" fill="#b2bec3" opacity="0.3"/>
  </g>

  <!-- === Connecting dashed arrow === -->
  <g filter="url(#linkGlow)">
    <path d="M 530 330 C 570 310, 600 300, 620 290" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
    <polygon points="622,287 616,296 626,294" fill="#6c5ce7" opacity="0.6"/>
  </g>

  <!-- Small link icon between -->
  <g transform="translate(565, 305)" opacity="0.5">
    <path d="M-6,-3 C-6,-8 -1,-10 3,-8 L6,-5 C3,-3 0,-5 -3,-3 Z" fill="none" stroke="#a29bfe" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M6,3 C6,8 1,10 -3,8 L-6,5 C-3,3 0,5 3,3 Z" fill="none" stroke="#a29bfe" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- === FRONT LAYER: Terminal window, tilted -3° === -->
  <g transform="translate(350, 310) rotate(-3)" filter="url(#termShadow)">
    <!-- Terminal body -->
    <rect x="-240" y="-180" width="480" height="360" rx="12" fill="#1e1e2e" stroke="#333348" stroke-width="1.5"/>

    <!-- Title bar -->
    <rect x="-240" y="-180" width="480" height="38" rx="12" fill="url(#titleBar)"/>
    <rect x="-240" y="-154" width="480" height="12" fill="url(#titleBar)"/>
    <!-- Traffic lights -->
    <circle cx="-218" cy="-161" r="6" fill="#ff5f57"/>
    <circle cx="-200" cy="-161" r="6" fill="#febc2e"/>
    <circle cx="-182" cy="-161" r="6" fill="#28c840"/>
    <!-- Title text -->
    <text x="0" y="-156" text-anchor="middle" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12" fill="#888" letter-spacing="0.5">claude — ~/Code/project</text>

    <!-- Terminal content -->
    <!-- Previous command context (dimmed) -->
    <text x="-216" y="-118" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13" fill="#585868">$ claude</text>

    <!-- Prompt line -->
    <text x="-216" y="-88" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13.5">
      <tspan fill="#a29bfe">❯</tspan>
      <tspan fill="#cdd6f4"> make this doc shareable as a gist</tspan>
    </text>

    <!-- Agent thinking indicator -->
    <text x="-216" y="-60" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#585868" font-style="italic">  Creating secret gist …</text>

    <!-- Agent response -->
    <text x="-216" y="-30" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13" fill="#a6adc8">  Created gist with title "Project Migration Notes"</text>

    <!-- Tool badge -->
    <rect x="-216" y="-14" width="82" height="20" rx="4" fill="#313244"/>
    <text x="-212" y="1" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10" fill="#6c5ce7" font-weight="bold">⚡ gh gist</text>

    <!-- The URL output - highlighted -->
    <rect x="-216" y="16" width="340" height="28" rx="6" fill="#6c5ce7" fill-opacity="0.1" stroke="#6c5ce7" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-206" y="35" font-family="SF Mono, Menlo, Consolas, monospace" font-size="14" fill="#a29bfe" font-weight="bold">→ md.solberg.is/a1b2c3d4</text>

    <!-- Copied badge -->
    <rect x="148" y="20" width="72" height="20" rx="10" fill="#00b894" fill-opacity="0.15" stroke="#00b894" stroke-opacity="0.4" stroke-width="0.8"/>
    <text x="156" y="34" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5" fill="#00b894" font-weight="bold">✓ copied</text>

    <!-- Next prompt - cursor blinking -->
    <text x="-216" y="72" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13.5">
      <tspan fill="#a29bfe">❯</tspan>
      <tspan fill="#cdd6f4"> </tspan>
    </text>
    <!-- Blinking cursor -->
    <rect x="-200" y="61" width="9" height="16" fill="#a29bfe" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Scrollbar hint -->
    <rect x="225" y="-130" width="4" height="60" rx="2" fill="#45475a" opacity="0.4"/>
  </g>

  <!-- Small floating share icons for atmosphere -->
  <g opacity="0.12">
    <!-- Link icon top-right -->
    <g transform="translate(1060, 80)">
      <circle cx="0" cy="0" r="16" fill="#6c5ce7"/>
      <path d="M-5,-2 L2,-8 M2,-8 L2,-3 M2,-8 L-3,-8" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Document icon bottom-left -->
    <g transform="translate(100, 520)">
      <circle cx="0" cy="0" r="14" fill="#00b894"/>
      <rect x="-5" y="-7" width="10" height="14" rx="1.5" fill="none" stroke="#fff" stroke-width="1.2"/>
      <line x1="-3" y1="-2" x2="3" y2="-2" stroke="#fff" stroke-width="0.8"/>
      <line x1="-3" y1="1" x2="3" y2="1" stroke="#fff" stroke-width="0.8"/>
      <line x1="-3" y1="4" x2="1" y2="4" stroke="#fff" stroke-width="0.8"/>
    </g>
  </g>
</svg>